server.port=8081

# Load local environment overrides if present (not committed)
spring.config.import=optional:file:./.env[.properties]

# Gemini Configuration
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.model=gemini-2.5-flash

# CORS
app.cors.allowed-origin-patterns=http://localhost:4200,https://qa-testingproject.netlify.app,https://*.netlify.app

# Logging
logging.level.com.aitestgen=DEBUG
